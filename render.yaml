services:
  - type: web
    name: traffic-violation-app
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      streamlit run src/streamlit_app.py --server.port=10000 --server.address=0.0.0.0
    envVars:
      - key: PORT
        value: 10000
